<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المحامي الآلي | محادثة ذكية</title>
    <meta name="theme-color" content="#d4af37">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href='data:application/manifest+json,{"name":"المحامي الآلي","short_name":"المحامي","start_url":".","display":"standalone","background_color":"#050505","theme_color":"#d4af37","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/6062/6062646.png","sizes":"512x512","type":"image/png"}]}'>

    <!-- Bootstrap 5 & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Supabase & SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';</script>

    <style>
        :root {
            --bg-dark: #050505;
            --bg-surface: #111111;
            --gold-royal: #d4af37;
            --gold-gradient: linear-gradient(135deg, #bf953f 0%, #fcf6ba 45%, #b38728 50%, #fbf5b7 55%, #aa771c 100%);
            --gold-glow: rgba(212, 175, 55, 0.3);
            --border-gold: 1px solid rgba(212, 175, 55, 0.4);
            --message-user: #1e2a3a;
            --message-ai: #2d1f1f;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            padding-top: 70px;
            padding-bottom: 20px;
        }
        .navbar-custom {
            position: fixed; top: 0; left: 0; right: 0; height: 70px;
            background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--gold-royal); z-index: 1000;
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
        }
        .gold-text {
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }
        .gold-btn {
            background: var(--gold-gradient); color: #000; font-weight: 800; border: none;
            transition: all 0.3s; box-shadow: 0 4px 15px var(--gold-glow);
        }
        .gold-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--gold-glow); color: #000; }
        .glass-card {
            background: var(--bg-surface); border: var(--border-gold); border-radius: 12px;
            padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(212,175,55,0.3);
            color: #fff; border-radius: 8px;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.1); border-color: var(--gold-royal);
            color: #fff; box-shadow: 0 0 10px var(--gold-glow);
        }
        label { color: #d4af37; font-weight: 600; margin-bottom: 5px; }
        .nav-tabs .nav-link { color: #888; border: none; font-weight: bold; }
        .nav-tabs .nav-link.active { background: transparent; color: var(--gold-royal); border-bottom: 2px solid var(--gold-royal); }
        .list-group-item { background: transparent; border-color: rgba(212,175,55,0.2); color: #ddd; }

        /* chat styles */
        .chat-container {
            height: 60vh; 
            overflow-y: auto; 
            padding: 10px; 
            background: #0a0a0a; 
            border-radius: 8px; 
            display: flex; 
            flex-direction: column;
        }
        .message {
            max-width: 80%;
            margin-bottom: 10px;
            padding: 10px 15px;
            border-radius: 15px;
            word-wrap: break-word;
        }
        .message-user {
            background-color: var(--message-user);
            align-self: flex-end;
            border-bottom-left-radius: 0;
            color: white;
        }
        .message-ai {
            background-color: var(--message-ai);
            align-self: flex-start;
            border-bottom-right-radius: 0;
            color: #ffd966;
        }
        .message-ai .actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            justify-content: flex-start;
        }
        .actions button {
            background: none;
            border: 1px solid #d4af37;
            color: #d4af37;
            border-radius: 5px;
            padding: 3px 8px;
            font-size: 0.75rem;
            transition: 0.2s;
        }
        .actions button:hover {
            background: #d4af37;
            color: #000;
        }
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 10px 15px;
            background: #2a2a2a;
            border-radius: 15px;
            align-self: flex-start;
            margin-bottom: 10px;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #d4af37;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
            30% { opacity: 1; transform: translateY(-5px); }
        }

        /* modal content */
        .draft-content {
            background: #0a0a0a;
            font-family: 'Amiri', serif;
            font-size: 1.2rem;
            line-height: 2;
            padding: 20px;
            border-radius: 8px;
            color: #f0f0f0;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

        <h4 class="gold-text mb-0">المحامي الآلي</h4>
    </div>

</div>

<div class="container">
    <!-- التبويبات -->
    <ul class="nav nav-tabs mb-4" id="myTab" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#chat">المحادثة</button></li>

        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#settings">الإعدادات</button></li>

    <div class="tab-content">
        <!-- ================= تبويب المحادثة ================= -->
        <div class="tab-pane fade show active" id="chat">
            <div class="glass-card">
                <!-- خيارات البحث والربط -->
                <div class="d-flex flex-wrap gap-3 mb-3 align-items-center">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="useLocalChat" checked>
                        <label class="form-check-label text-white">المكتبة المحلية</label>
                    </div>
                    <div class="form-check form-switch">

                        <label class="form-check-label text-white">البحث عبر Tavily</label>

        <!-- ================= تبويب المكتبة المحلية ================= -->
        <div class="tab-pane fade" id="knowledge">
            <div class="glass-card">
                <h5 class="gold-text"><i class="bi bi-journal-bookmark"></i> مكتبتي المحلية</h5>
                <p class="text-muted small">ارفع الكتب أو ملفات الأحكام (PDF/TXT). سيقرأها النظام ويحفظ نصوصها محلياً لاستخدامها في الردود.</p>
                
                <div class="mb-3">

                </div>
                <button class="btn btn-outline-warning w-100 mb-3" onclick="processLocalFiles()">
                    <i class="bi bi-upload"></i> رفع واستخراج النصوص
                </button>
                
                <hr class="border-secondary">
                
                <h6 class="gold-text">الملفات المحفوظة:</h6>
                <div id="savedFilesList" class="list-group list-group-flush mb-3" style="background:transparent;"></div>
                
                <h6 class="gold-text mt-3">الاستشارات المحفوظة:</h6>
                <div id="savedResponsesList" class="list-group list-group-flush mb-3" style="background:transparent;"></div>

                <h6 class="gold-text mt-3">المحادثات السابقة:</h6>
                <div id="savedChatsList" class="list-group list-group-flush mb-3" style="background:transparent;"></div>

                <div class="d-flex justify-content-end mt-3">
                    <button class="btn btn-sm btn-danger" onclick="clearLocalKB()"><i class="bi bi-trash"></i> مسح الكل</button>
                </div>
            </div>
        </div>

        <!-- ================= تبويب الإعدادات ================= -->
        <div class="tab-pane fade" id="settings">
            <div class="glass-card row g-3">
                <h5 class="gold-text col-12"><i class="bi bi-gear"></i> إعدادات المفاتيح</h5>
                
                <div class="col-md-6">
                    <label>مفتاح OpenRouter</label>

                </div>
                <div class="col-md-6">
                    <label>مفتاح Groq</label>
                    <input type="password" id="groqKey" class="form-control" placeholder="gsk_..." onchange="saveSettings()">
                </div>
                <div class="col-12">
                    <label>مفتاح Tavily</label>
                    <input type="password" id="tavilyKey" class="form-control" placeholder="tvly-..." onchange="saveSettings()">
                </div>
                <div class="col-md-6">
                    <label>المنصة الأساسية</label>
                    <select id="aiProvider" class="form-select" onchange="saveSettings()">
                        <option value="openrouter">OpenRouter</option>
                        <option value="groq">Groq</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label>اسم النموذج</label>
                    <input type="text" id="aiModel" class="form-control" placeholder="llama-3.3-70b-versatile" onchange="saveSettings()">
                </div>
                <div class="col-12">
                    <label>مفاتيح Supabase (اختياري لربط القضايا)</label>
                    <input type="text" id="supabaseUrl" class="form-control mb-2" placeholder="URL" value="https://iyhfafodhptcdwrjywek.supabase.co">
                    <input type="password" id="supabaseKey" class="form-control" placeholder="Anon Key" value="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5aGZhZm9kaHB0Y2R3cmp5d2VrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMzUzODYsImV4cCI6MjA4MjcxMTM4Nn0.YmeMSDkQ3Z_vpyMTyZ-3jbKLFzVZzwcLeDsdczrErHQ">
                </div>
                <div class="col-12 text-muted small">يتم حفظ جميع المفاتيح في جهازك فقط (localStorage).</div>

<!-- مودال عرض المذكرة -->
<div class="modal fade" id="draftModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content bg-dark text-light border-warning">
            <div class="modal-header">
                <h5 class="gold-text">المذكرة القانونية</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>

                <button class="btn btn-secondary" data-bs-dismiss="modal">إغلاق</button>

</div>

<script>
    // ==========================================
    // المتغيرات العامة والتهيئة
    // ==========================================
    let localDB; // IndexedDB
    let db; // Supabase client

    // متغيرات المحادثة
    let chatMessages = []; // مصفوفة الرسائل { role: 'user'/'assistant', content: '', timestamp: ... }
    let isWaitingForResponse = false;
    let currentCaseContext = ""; // سياق القضية الحالي

    // إعدادات API
    let openrouterKey = "", groqKey = "", tavilyKey = "";
    let aiProvider = "openrouter", aiModel = "llama-3.3-70b-versatile";
    let supabaseUrl = "https://iyhfafodhptcdwrjywek.supabase.co";
    let supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5aGZhZm9kaHB0Y2R3cmp5d2VrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcxMzUzODYsImV4cCI6MjA4MjcxMTM4Nn0.YmeMSDkQ3Z_vpyMTyZ-3jbKLFzVZzwcLeDsdczrErHQ";

    // تحميل الإعدادات من localStorage
    function loadSettings() {
        openrouterKey = localStorage.getItem('openrouterKey') || '';
        groqKey = localStorage.getItem('groqKey') || '';
        tavilyKey = localStorage.getItem('tavilyKey') || '';
        aiProvider = localStorage.getItem('aiProvider') || 'openrouter';
        aiModel = localStorage.getItem('aiModel') || 'llama-3.3-70b-versatile';

        document.getElementById('openrouterKey').value = openrouterKey;
        document.getElementById('groqKey').value = groqKey;
        document.getElementById('tavilyKey').value = tavilyKey;
        document.getElementById('aiProvider').value = aiProvider;
        document.getElementById('aiModel').value = aiModel;
        document.getElementById('supabaseUrl').value = supabaseUrl;
        document.getElementById('supabaseKey').value = supabaseAnonKey;

        initIndexedDB();
    }

    function saveSettings() {
        localStorage.setItem('openrouterKey', document.getElementById('openrouterKey').value.trim());
        localStorage.setItem('groqKey', document.getElementById('groqKey').value.trim());
        localStorage.setItem('tavilyKey', document.getElementById('tavilyKey').value.trim());
        localStorage.setItem('aiProvider', document.getElementById('aiProvider').value);
        localStorage.setItem('aiModel', document.getElementById('aiModel').value.trim());
        Swal.fire("تم", "تم حفظ الإعدادات", "success");
        // تحديث المتغيرات
        loadSettings();
    }

    window.onload = loadSettings;

    // ==========================================
    // IndexedDB
    // ==========================================
    function initIndexedDB() {
        const request = indexedDB.open("LawyerLocalDB", 3);
        request.onupgradeneeded = (e) => {
            let db = e.target.result;
            if (!db.objectStoreNames.contains('documents')) {
                db.createObjectStore('documents', { keyPath: 'id', autoIncrement: true });
            }
            if (!db.objectStoreNames.contains('responses')) {
                db.createObjectStore('responses', { keyPath: 'id', autoIncrement: true });
            }
            if (!db.objectStoreNames.contains('chats')) {
                db.createObjectStore('chats', { keyPath: 'id', autoIncrement: true });
            }
        };
        request.onsuccess = (e) => {
            localDB = e.target.result;
            updateSavedFilesUI();
            updateSavedResponsesUI();
            updateSavedChatsUI();
            loadMostRecentChat(); // تحميل آخر محادثة عند البدء
        };
        request.onerror = (e) => console.error("IndexedDB error", e);
    }

    // وظائف الملفات والاستشارات (كما في السابق، مع اختصارات)
    async function processLocalFiles() {
        const files = document.getElementById('localFileInput').files;
        if (files.length === 0) return Swal.fire("تنبيه", "اختر ملفات أولاً", "warning");
        Swal.fire({ title: 'جاري استخراج النصوص...', didOpen: () => Swal.showLoading() });
        for (let file of files) {
            try {
                let text = "";
                if (file.type === "application/pdf") {
                    text = await extractTextFromPDF(file);
                } else {
                    text = await file.text();
                }
                await saveDocument(file.name, text);
            } catch (err) { console.error(err); }
        }
        Swal.fire("تم", "تم حفظ الملفات", "success");
        document.getElementById('localFileInput').value = "";
        updateSavedFilesUI();
    }

    async function extractTextFromPDF(file) {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        let fullText = "";
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const textContent = await page.getTextContent();
            fullText += textContent.items.map(s => s.str).join(' ') + "\n";
        }
        return fullText;
    }

    function saveDocument(name, content) {
        return new Promise((resolve, reject) => {
            const tx = localDB.transaction(['documents'], 'readwrite');
            tx.objectStore('documents').add({ name, content, type: 'file', date: new Date().toLocaleString('ar-EG') });
            tx.oncomplete = resolve;
            tx.onerror = reject;
        });
    }

    async function searchLocalDocuments(query) {
        return new Promise((resolve) => {
            if (!localDB) return resolve("");
            const tx = localDB.transaction(['documents'], 'readonly');
            tx.objectStore('documents').getAll().onsuccess = (e) => {
                const docs = e.target.result;
                let results = "";
                const keywords = query.split(' ').filter(w => w.length > 3).slice(0, 7);
                docs.forEach(doc => {
                    let matched = false;
                    keywords.forEach(kw => {
                        const idx = doc.content.indexOf(kw);
                        if (idx !== -1 && !matched) {
                            const start = Math.max(0, idx - 300);
                            const end = Math.min(doc.content.length, idx + 300);
                            results += `[${doc.name}]: ...${doc.content.substring(start, end)}...\n`;
                            matched = true;
                        }
                    });
                });
                resolve(results);
            };
        });
    }

    function updateSavedFilesUI() {
        if (!localDB) return;
        const tx = localDB.transaction(['documents'], 'readonly');
        tx.objectStore('documents').getAll().onsuccess = (e) => {
            const docs = e.target.result;
            const container = document.getElementById('savedFilesList');
            container.innerHTML = docs.length === 0 ? '<div class="text-muted small">لا توجد ملفات مرفوعة.</div>' : '';
            docs.forEach(d => {
                container.innerHTML += `<div class="list-group-item d-flex justify-content-between small"><span>📄 ${d.name}</span><span class="text-muted">${d.date}</span></div>`;
            });
        };
    }

    // حفظ الرد في الاستشارات
    function saveResponseToLibrary(content, title) {
        if (!content) return;
        const tx = localDB.transaction(['responses'], 'readwrite');
        tx.objectStore('responses').add({ title: title || "استشارة", content, date: new Date().toLocaleString('ar-EG') });
        tx.oncomplete = () => { Swal.fire("تم", "حُفظت في المكتبة", "success"); updateSavedResponsesUI(); };
    }

    function updateSavedResponsesUI() {
        if (!localDB) return;
        const tx = localDB.transaction(['responses'], 'readonly');
        tx.objectStore('responses').getAll().onsuccess = (e) => {
            const res = e.target.result;
            const container = document.getElementById('savedResponsesList');
            container.innerHTML = res.length === 0 ? '<div class="text-muted small">لا توجد استشارات محفوظة.</div>' : '';
            res.sort((a,b) => new Date(b.date)-new Date(a.date)).forEach(r => {
                container.innerHTML += `<div class="list-group-item d-flex justify-content-between small"><span>💬 ${r.title}</span><span class="text-muted">${r.date}</span></div>`;
            });
        };
    }

    // المحادثات السابقة
    function updateSavedChatsUI() {
        if (!localDB) return;
        const tx = localDB.transaction(['chats'], 'readonly');
        tx.objectStore('chats').getAll().onsuccess = (e) => {
            const chats = e.target.result;
            const container = document.getElementById('savedChatsList');
            container.innerHTML = chats.length === 0 ? '<div class="text-muted small">لا توجد محادثات سابقة.</div>' : '';
            chats.sort((a,b) => new Date(b.date)-new Date(a.date)).forEach(c => {
                container.innerHTML += `<div class="list-group-item d-flex justify-content-between small" style="cursor:pointer;" onclick="loadChatFromDB(${c.id})"><span>🗣️ ${c.title}</span><span class="text-muted">${c.date}</span></div>`;
            });
        };
    }

    function loadChatFromDB(id) {
        const tx = localDB.transaction(['chats'], 'readonly');
        tx.objectStore('chats').get(id).onsuccess = (e) => {
            const chat = e.target.result;
            if (chat && chat.history) {
                chatMessages = chat.history;
                currentCaseContext = chat.context || "";
                renderChatMessages();
                // التبديل إلى تبويب المحادثة
                new bootstrap.Tab(document.querySelector('#chat-tab')).show();
            }
        };
    }

    function saveCurrentChat() {
        if (!localDB || chatMessages.length === 0) return;
        const title = chatMessages[0]?.content.substring(0,30) + "...";
        const tx = localDB.transaction(['chats'], 'readwrite');
        tx.objectStore('chats').add({
            title,
            history: chatMessages,
            date: new Date().toLocaleString('ar-EG'),
            context: currentCaseContext
        });
        tx.oncomplete = () => updateSavedChatsUI();
    }

    function loadMostRecentChat() {
        // تحميل آخر محادثة من IndexedDB (أحدثها)
        if (!localDB) return;
        const tx = localDB.transaction(['chats'], 'readonly');
        tx.objectStore('chats').getAll().onsuccess = (e) => {
            const chats = e.target.result;
            if (chats.length > 0) {
                const last = chats.sort((a,b) => new Date(b.date)-new Date(a.date))[0];
                chatMessages = last.history || [];
                currentCaseContext = last.context || "";
                renderChatMessages();
            }
        };
    }

    // ==========================================
    // ربط القضية (في المحادثة)
    // ==========================================
    async function fetchCaseDataChat() {
        const val = prompt("أدخل الرقم الإداري للقضية:");
        if (!val) return;
        const url = document.getElementById('supabaseUrl').value || supabaseUrl;
        const key = document.getElementById('supabaseKey').value || supabaseAnonKey;
        db = supabase.createClient(url, key);
        Swal.fire({ title: 'جاري البحث...', didOpen: () => Swal.showLoading() });
        const { data, error } = await db.from('cases').select('*').ilike('case_code', `%${val}%`).limit(1).single();
        Swal.close();
        if (error || !data) {
            Swal.fire("لم يتم العثور", "تأكد من الرقم الإداري.", "error");
            currentCaseContext = "";
            document.getElementById('caseInfoChat').innerHTML = "";
        } else {
            currentCaseContext = `--- بيانات القضية ---
العميل: ${data.client_name} (${data.client_role || 'موكل'})
الخصم: ${data.opponent_name || 'غير محدد'}
المحكمة: ${data.court_name || 'غير محددة'} - الدائرة: ${data.circle || '-'}
الموضوع: ${data.case_subject || ''}
ملاحظات: ${data.notes || ''}
---------------------\n`;
            document.getElementById('caseInfoChat').innerHTML = `✅ تم الربط بقضية: <strong>${data.client_name}</strong>`;
        }
    }

    // ==========================================
    // Tavily Search
    // ==========================================
    async function tavilySearch(query) {
        const key = document.getElementById('tavilyKey').value || tavilyKey;
        if (!key) return "";
        try {
            const res = await fetch('https://api.tavily.com/search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ api_key: key, query: "قانون مصري: " + query, search_depth: "advanced", include_answer: true })
            });
            const data = await res.json();
            return data.answer || (data.results ? data.results.map(r => r.content).join('\n') : "");
        } catch { return ""; }
    }

    // ==========================================
    // إرسال رسالة في المحادثة
    // ==========================================
    async function sendChatMessage() {
        if (isWaitingForResponse) return;
        const input = document.getElementById('chatInput');
        const message = input.value.trim();
        if (!message) return;

        // إضافة رسالة المستخدم إلى الشات
        chatMessages.push({ role: 'user', content: message, timestamp: new Date().toLocaleTimeString() });
        renderChatMessages();
        input.value = '';

        // إظهار مؤشر الكتابة
        isWaitingForResponse = true;
        showTypingIndicator();

        // تجهيز السياق
        const useLocal = document.getElementById('useLocalChat').checked;
        const useTavily = document.getElementById('useTavilyChat').checked;

        let fullContext = currentCaseContext || '';
        if (useLocal) {
            const localRes = await searchLocalDocuments(message);
            if (localRes) fullContext += `\n--- من المكتبة المحلية ---\n${localRes}\n`;
        }
        if (useTavily) {
            const webRes = await tavilySearch(message);
            if (webRes) fullContext += `\n--- من بحث Tavily ---\n${webRes}\n`;
        }

        // اختيار API
        const provider = document.getElementById('aiProvider').value;
        const model = document.getElementById('aiModel').value.trim();
        let apiKey = provider === 'openrouter' 
            ? (document.getElementById('openrouterKey').value || openrouterKey)
            : (document.getElementById('groqKey').value || groqKey);
        if (!apiKey) {
            hideTypingIndicator();
            Swal.fire("تنبيه", "مفتاح API غير موجود في الإعدادات", "warning");
            isWaitingForResponse = false;
            return;
        }

        // بناء تاريخ المحادثة (آخر 10 رسائل)
        const recentMessages = chatMessages.slice(-10).map(m => ({
            role: m.role === 'user' ? 'user' : 'assistant',
            content: m.content
        }));

        const systemPrompt = `أنت محامي مصري خبير، لغتك العربية فصيحة وقانونية رصينة. أجب على أسئلة المحامي بناءً على السياق المقدم إن وجد، وإلا فاستخدم معرفتك القانونية. إذا طلب منك كتابة مذكرة أو صياغة، فقدم النص كاملاً.`;
        const userMessage = `السياق الحالي:\n${fullContext}\n\nالرسالة: ${message}`;

        let endpoint = provider === 'openrouter' ? 'https://openrouter.ai/api/v1/chat/completions' : 'https://api.groq.com/openai/v1/chat/completions';
        let headers = {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
        };
        if (provider === 'openrouter') {
            headers['HTTP-Referer'] = window.location.href;
            headers['X-Title'] = 'AI Lawyer Chat';
        }

        try {
            const response = await fetch(endpoint, {
                method: 'POST',
                headers,
                body: JSON.stringify({
                    model: model,
                    messages: [
                        { role: 'system', content: systemPrompt },
                        ...recentMessages,
                        { role: 'user', content: userMessage }
                    ],
                    temperature: 0.3
                })
            });

            const json = await response.json();
            if (json.error) throw new Error(json.error.message);

            const reply = json.choices[0].message.content;

            // إخفاء مؤشر الكتابة
            hideTypingIndicator();

            // إضافة رد المساعد
            chatMessages.push({ role: 'assistant', content: reply, timestamp: new Date().toLocaleTimeString() });
            renderChatMessages();

            // حفظ المحادثة في IndexedDB
            saveCurrentChat();

        } catch (error) {
            console.error(error);
            hideTypingIndicator();
            Swal.fire("خطأ", error.message, "error");
        } finally {
            isWaitingForResponse = false;
        }
    }

    // عرض مؤشر الكتابة
    function showTypingIndicator() {
        const container = document.getElementById('chatMessages');
        const typingDiv = document.createElement('div');
        typingDiv.className = 'typing-indicator';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = '<span></span><span></span><span></span>';
        container.appendChild(typingDiv);
        container.scrollTop = container.scrollHeight;
    }

    function hideTypingIndicator() {
        const indicator = document.getElementById('typingIndicator');
        if (indicator) indicator.remove();
    }

    // عرض جميع الرسائل
    function renderChatMessages() {
        const container = document.getElementById('chatMessages');
        container.innerHTML = '';
        chatMessages.forEach((msg, index) => {
            const div = document.createElement('div');
            div.className = `message ${msg.role === 'user' ? 'message-user' : 'message-ai'}`;
            div.innerHTML = `<div>${msg.content.replace(/\n/g, '<br>')}</div>`;
            if (msg.role === 'assistant') {
                // إضافة أزرار للرد
                const actions = document.createElement('div');
                actions.className = 'actions';
                actions.innerHTML = `
                    <button onclick="showAsDraft(${index})"><i class="bi bi-window"></i> عرض كمذكرة</button>
                    <button onclick="saveResponseToLibrary('${msg.content.replace(/'/g, "\\'")}', 'رد من المحادثة')"><i class="bi bi-save"></i> حفظ</button>
                    <button onclick="exportAsWord('${msg.content.replace(/'/g, "\\'")}')"><i class="bi bi-file-word"></i> Word</button>
                `;
                div.appendChild(actions);
            }
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    }

    // عرض رد معين كمذكرة في مودال
    function showAsDraft(index) {
        const content = chatMessages[index].content;
        document.getElementById('draftContent').innerHTML = content.replace(/\n/g, '<br>');
        new bootstrap.Modal(document.getElementById('draftModal')).show();
    }

    function exportAsWord(content) {
        const html = `
            <html>
            <head><meta charset='utf-8'><style>body { font-family: 'Amiri', serif; direction: rtl; font-size: 14pt; line-height: 2; }</style></head>
            <body>${content.replace(/\n/g, '<br>')}</body>
            </html>
        `;
        const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'مذكرة.doc';
        a.click();
    }

    // دوال المودال
    function saveDraftAsWord() {
        const content = document.getElementById('draftContent').innerText;
        exportAsWord(content);
    }

    function copyDraft() {
        const content = document.getElementById('draftContent').innerText;
        navigator.clipboard.writeText(content).then(() => Swal.fire("تم النسخ"));
    }

    // مسح المكتبة
    function clearLocalKB() {
        if (!confirm("مسح كل البيانات المحلية؟")) return;
        const tx = localDB.transaction(['documents', 'responses', 'chats'], 'readwrite');
        tx.objectStore('documents').clear();
        tx.objectStore('responses').clear();
        tx.objectStore('chats').clear();
        tx.oncomplete = () => {
            Swal.fire("تم المسح");
            updateSavedFilesUI(); updateSavedResponsesUI(); updateSavedChatsUI();
        };
    }

    // PWA
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBtn').style.display = 'inline-block';
    });
    function installPWA() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(() => document.getElementById('installBtn').style.display = 'none');
        }
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
